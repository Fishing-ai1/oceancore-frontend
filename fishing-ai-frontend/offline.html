<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>OceanCore AI Offline</title>
  <meta name="theme-color" content="#040813"/>
  <style>
    :root{color-scheme:dark}
    *{box-sizing:border-box}
    body{
      min-height:100vh;margin:0;display:grid;place-items:center;padding:24px;
      background:radial-gradient(circle at top left,rgba(73,231,255,.14),transparent 28%),linear-gradient(180deg,#02050e,#040813 45%,#000);
      color:#e8f0ff;font:15px/1.55 Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif;
    }
    main{width:min(520px,100%);border:1px solid rgba(148,163,184,.22);border-radius:24px;padding:24px;background:rgba(8,15,32,.92);box-shadow:0 24px 64px rgba(0,0,0,.5)}
    .logo{width:56px;height:56px;border-radius:18px;background:conic-gradient(from 210deg,#49e7ff,#7dffd5,#4c6fff,#49e7ff);box-shadow:0 0 24px rgba(73,231,255,.42);margin-bottom:18px}
    h1{margin:0 0 8px;font-size:24px;letter-spacing:.08em;text-transform:uppercase}
    p{margin:0 0 14px;color:#a9bddf}
    a{display:inline-flex;align-items:center;justify-content:center;margin-top:8px;padding:11px 14px;border-radius:14px;border:1px solid rgba(73,231,255,.42);color:#04121a;background:linear-gradient(135deg,#7dffd5,#49e7ff);font-weight:900;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <div class="logo" aria-hidden="true"></div>
    <h1>OceanCore AI</h1>
    <p>You are offline. Cached screens may still open, but live conditions, AI answers, uploads, account sync, and community posts need internet.</p>
    <p>Reconnect before relying on marine conditions or trip planning.</p>
    <a href="/app/">Try Again</a>
  </main>
</body>
</html>
